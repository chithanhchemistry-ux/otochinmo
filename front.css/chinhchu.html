<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ô Tô Chín Mò - Phụ tùng chính hãng</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚗</text></svg>">
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

  <header>
    <div class="header-container">
      <div class="logo">
        <h1>🚗 Ô TÔ CHÍN MÒ</h1>
      </div>
      
      <div class="search-bar">
        <input type="text" id="search" placeholder="Tìm lốp, nhớt, phanh..." />
        <button onclick="searchProduct()"><i class="material-icons">search</i></button>
      </div>id="user-display">Tài khoản</span>
        </button>
        <button onclick="toggleModal('cart-modal')" class="cart-btn">
          <i class="material-icons">shopping_cart</i> 
          <span class="badge" id="cart-count">0</span>
        </button>
      </div>
    </div>
  </header>

  <section class="hero-banner">
    <h2>CHUYÊN GIA PHỤ TÙNG & ĐỒ CHƠI XE HƠI</h2>
    <p>Uy tín - Chất lượng - Tốc độ</p>
  </section>

  <main>
    <details class="admin-panel">
      <summary>⚙️ Quản lý sản phẩm (Dành cho Admin)</summary>
      <div class="add-product-form">
        <input type="text" id="product-name" placeholder="Tên phụ tùng" />
        <input type="number" id="product-price" placeholder="Giá (VNĐ)" />
        <input type="text" id="product-image" placeholder="Link ảnh sản phẩm" />
        <button onclick="addProduct()">Đăng bán ngay</button>
      </div>
    </details>

    <div class="section-title">
      <h3>SẢN PHẨM NỔI BẬT</h3>
    </div>
    <section id="product-list">
      </section>
  </main>

  <footer>
    <p>&copy; 2025 Ô Tô Chín Mò. Hệ thống phụ tùng số 1 Vũng Tàu.</p>
  </footer>

  <div id="cart-modal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="toggleModal('cart-modal')">&times;</span>
      <h2>Giỏ hàng của bạn</h2>
      <ul id="cart-list"></ul>
      <div class="cart-summary">
        <p>Tổng cộng: <strong id="cart-total">0 VNĐ</strong></p>
        <button onclick="placeOrder()" class="btn-primary">Đặt hàng ngay</button>
      </div>
    </div>
  </div>

  <div id="auth-modal" class="modal">
    <div class="modal-content small-modal">
      <span class="close" onclick="toggleModal('auth-modal')">&times;</span>
      <h2>Thành viên</h2>
      <input type="email" id="email" placeholder="Email" />
      <input type="password" id="password" placeholder="Mật khẩu" />
      <div class="auth-buttons">
        <button onclick="login()" class="btn-primary">Đăng nhập</button>
        <button onclick="register()" class="btn-secondary">Đăng ký</button>
      </div>
      <div id="login-msg"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
